name: Tests

on:
  push:
    branches: [ main, rc/*, feat/*, dev-divesh ]
  pull_request:
    branches: [ main, rc/*, feat/*, dev-divesh ]

jobs:
  test:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go 1.23.6
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.6
        id: go

      - name: Check out code
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          go mod download
      - name: Unit tests
        run: make test
